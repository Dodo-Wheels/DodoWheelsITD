

<style>
  .tabs{display:flex;gap:0;border-bottom:1.5px solid #E8E6E0;margin-bottom:0;overflow-x:auto;}
  .tab{padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#888780;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;white-space:nowrap;transition:color .15s;}
  .tab:hover{color:#444441;}
  .tab.active{color:#3C3489;border-bottom-color:#3C3489;}
  .panel{display:none;}.panel.active{display:block;}
</style>
<h2 class="sr-only">业务流程图 — 客户下单、新客注册、订单处理履行</h2>
<div class="tabs">
  <button class="tab active" onclick="showTab('order',this)">客户下单流程</button>
  <button class="tab" onclick="showTab('newcust',this)">新客注册审核</button>
  <button class="tab" onclick="showTab('fulfil',this)">订单处理履行</button>
</div>

<!-- TAB 1 -->
<div class="panel active" id="tab-order">
<svg width="100%" viewBox="0 0 680 660" role="img">
  <title>客户下单流程</title>
  <desc>客人访问网站，新客走注册审核流程，老客直接下单，根据地区分流处理。</desc>
  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Start -->
  <g class="node c-purple" onclick="sendPrompt('什么类型的客人会访问网站下单？')">
    <ellipse cx="340" cy="34" rx="100" ry="22" stroke-width="0.5"/>
    <text class="th" x="340" y="34" text-anchor="middle" dominant-baseline="central">客人访问网站</text>
  </g>

  <line x1="340" y1="56" x2="340" y2="84" stroke="#AFA9EC" stroke-width="1" marker-end="url(#a1)"/>

  <!-- Decision -->
  <polygon points="340,86 424,122 340,158 256,122" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="th" x="340" y="116" text-anchor="middle" dominant-baseline="central" fill="#3C3489">新客</text>
  <text class="th" x="340" y="134" text-anchor="middle" dominant-baseline="central" fill="#3C3489">或老客？</text>

  <!-- Branch labels -->
  <text class="ts" x="200" y="114" text-anchor="middle" fill="#534AB7">新客</text>
  <text class="ts" x="486" y="114" text-anchor="middle" fill="#534AB7">老客</text>

  <!-- Left arrow -->
  <line x1="256" y1="122" x2="152" y2="122" stroke="#AFA9EC" stroke-width="1" marker-end="url(#a1)"/>
  <!-- Right arrow -->
  <line x1="424" y1="122" x2="528" y2="122" stroke="#AFA9EC" stroke-width="1" marker-end="url(#a1)"/>

  <!-- Register box -->
  <g class="node c-teal" onclick="sendPrompt('新客注册等待批准的步骤？')">
    <rect x="60" y="98" width="188" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="154" y="118" text-anchor="middle" dominant-baseline="central">注册，等待批准</text>
    <text class="ts" x="154" y="136" text-anchor="middle" dominant-baseline="central">进入审核流程</text>
  </g>

  <!-- Place order box -->
  <g class="node c-teal" onclick="sendPrompt('老客直接下单的流程是什么？')">
    <rect x="432" y="98" width="160" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="512" y="122" text-anchor="middle" dominant-baseline="central">直接下单</text>
  </g>

  <!-- Arrow from place order -->
  <line x1="512" y1="146" x2="512" y2="186" stroke="#5DCAA5" stroke-width="1" marker-end="url(#a1)"/>

  <!-- Region decision diamond -->
  <polygon points="512,188 604,228 512,268 420,228" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="0.5"/>
  <text class="th" x="512" y="222" text-anchor="middle" dominant-baseline="central" fill="#085041">客户地区</text>
  <text class="th" x="512" y="240" text-anchor="middle" dominant-baseline="central" fill="#085041">判断</text>

  <!-- YU arrow left -->
  <line x1="420" y1="228" x2="312" y2="228" stroke="#5DCAA5" stroke-width="1" marker-end="url(#a1)"/>
  <text class="ts" x="364" y="218" text-anchor="middle" fill="#0F6E56">YU客人</text>

  <!-- MTL/ON arrow down -->
  <line x1="512" y1="268" x2="512" y2="310" stroke="#5DCAA5" stroke-width="1" marker-end="url(#a1)"/>
  <text class="ts" x="545" y="292" text-anchor="start" fill="#0F6E56">大蒙MTL</text>

  <!-- QC/ON arrow right -->
  <line x1="604" y1="228" x2="648" y2="228" stroke="#9FE1CB" stroke-width="1" marker-end="url(#a1)"/>
  <text class="ts" x="608" y="218" text-anchor="start" fill="#0F6E56">QC/ON</text>

  <!-- YU box -->
  <g class="node c-purple" onclick="sendPrompt('YU客人如何处理订单？')">
    <rect x="188" y="204" width="120" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="248" y="224" text-anchor="middle" dominant-baseline="central">YU 客人</text>
    <text class="ts" x="248" y="242" text-anchor="middle" dominant-baseline="central">发票/现金单</text>
  </g>

  <!-- MTL box -->
  <g class="node c-teal" onclick="sendPrompt('大蒙MTL/ON客人的处理方式？')">
    <rect x="412" y="312" width="200" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="512" y="332" text-anchor="middle" dominant-baseline="central">大蒙MTL/ON客人</text>
    <text class="ts" x="512" y="350" text-anchor="middle" dominant-baseline="central">发票/现金单</text>
  </g>

  <!-- PENDING badge -->
  <g class="node c-amber" onclick="sendPrompt('PENDING-ON/QC状态说明？')">
    <rect x="642" y="204" width="30" height="48" rx="6" stroke-width="0.5"/>
    <text class="ts" x="657" y="224" text-anchor="middle" dominant-baseline="central" fill="#633806">P</text>
    <text class="ts" x="657" y="240" text-anchor="middle" dominant-baseline="central" fill="#633806">QC</text>
  </g>

  <!-- Converge arrows to confirm box -->
  <line x1="248" y1="252" x2="248" y2="430" stroke="#AFA9EC" stroke-width="1"/>
  <line x1="248" y1="430" x2="346" y2="430" stroke="#AFA9EC" stroke-width="1" marker-end="url(#a1)"/>
  <line x1="512" y1="360" x2="512" y2="430" stroke="#5DCAA5" stroke-width="1"/>
  <line x1="512" y1="430" x2="490" y2="430" stroke="#5DCAA5" stroke-width="1" marker-end="url(#a1)"/>

  <!-- Confirm order -->
  <g class="node c-purple" onclick="sendPrompt('确认订单配送/折扣/VIP价格的要点？')">
    <rect x="250" y="408" width="230" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="365" y="425" text-anchor="middle" dominant-baseline="central">确认配送/产品/折扣</text>
    <text class="ts" x="365" y="443" text-anchor="middle" dominant-baseline="central">PO、VIP价格、轮胎税</text>
  </g>

  <line x1="365" y1="452" x2="365" y2="484" stroke="#AFA9EC" stroke-width="1" marker-end="url(#a1)"/>

  <!-- Add notes -->
  <g class="node c-teal" onclick="sendPrompt('客人备注和特殊要求如何处理？')">
    <rect x="250" y="486" width="230" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="365" y="503" text-anchor="middle" dominant-baseline="central">加入客人备注</text>
    <text class="ts" x="365" y="521" text-anchor="middle" dominant-baseline="central">检查特殊要求</text>
  </g>

  <line x1="365" y1="530" x2="365" y2="562" stroke="#5DCAA5" stroke-width="1" marker-end="url(#a1)"/>

  <!-- Print invoice -->
  <g class="node c-gray" onclick="sendPrompt('打印invoice和packing slip的数量和规则？')">
    <rect x="250" y="564" width="230" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="365" y="581" text-anchor="middle" dominant-baseline="central">打印 2/3 张</text>
    <text class="ts" x="365" y="599" text-anchor="middle" dominant-baseline="central">invoice / packing slip</text>
  </g>

  <!-- End arrow -->
  <line x1="365" y1="608" x2="365" y2="636" stroke="#B4B2A9" stroke-width="1" marker-end="url(#a1)"/>

  <g class="node c-gray">
    <ellipse cx="365" cy="648" rx="100" ry="16" stroke-width="0.5"/>
    <text class="th" x="365" y="648" text-anchor="middle" dominant-baseline="central">进入履行流程</text>
  </g>

</svg>
</div>

<!-- TAB 2 -->
<div class="panel" id="tab-newcust">
<svg width="100%" viewBox="0 0 680 480" role="img">
  <title>新客注册审核流程</title>
  <desc>新客提交信息后，系统核查GoogleMAP和QC Registry，符合则开户，不符则暂置。</desc>
  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <g class="node c-teal">
    <ellipse cx="340" cy="34" rx="120" ry="22" stroke-width="0.5"/>
    <text class="th" x="340" y="34" text-anchor="middle" dominant-baseline="central">新客提交注册信息</text>
  </g>

  <line x1="340" y1="56" x2="340" y2="88" stroke="#5DCAA5" stroke-width="1" marker-end="url(#a2)"/>

  <g class="node c-purple" onclick="sendPrompt('如何对照GoogleMAP和QC Registry核查客户？')">
    <rect x="190" y="90" width="300" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="110" text-anchor="middle" dominant-baseline="central">对照 GoogleMAP</text>
    <text class="th" x="340" y="130" text-anchor="middle" dominant-baseline="central">/ QC REGISTRY 核查</text>
  </g>

  <line x1="340" y1="142" x2="340" y2="178" stroke="#AFA9EC" stroke-width="1" marker-end="url(#a2)"/>

  <!-- Decision -->
  <polygon points="340,180 450,222 340,264 230,222" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="th" x="340" y="214" text-anchor="middle" dominant-baseline="central" fill="#3C3489">信息</text>
  <text class="th" x="340" y="232" text-anchor="middle" dominant-baseline="central" fill="#3C3489">是否符合？</text>

  <!-- Left: no match -->
  <line x1="230" y1="222" x2="116" y2="222" stroke="#AFA9EC" stroke-width="1" marker-end="url(#a2)"/>
  <text class="ts" x="170" y="212" text-anchor="middle" fill="#534AB7">不符</text>

  <g class="node c-amber" onclick="sendPrompt('信息不符时如何处理，后续如何跟进？')">
    <rect x="36" y="196" width="78" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="75" y="216" text-anchor="middle" dominant-baseline="central">暂时</text>
    <text class="th" x="75" y="234" text-anchor="middle" dominant-baseline="central">放置</text>
  </g>

  <line x1="75" y1="248" x2="75" y2="400" stroke="#FAC775" stroke-width="1" stroke-dasharray="4 3"/>
  <text class="ts" x="75" y="418" text-anchor="middle" fill="#854F0B">待后续跟进</text>

  <!-- Right: match -->
  <line x1="450" y1="222" x2="564" y2="222" stroke="#5DCAA5" stroke-width="1" marker-end="url(#a2)"/>
  <text class="ts" x="510" y="212" text-anchor="middle" fill="#0F6E56">确认无误</text>

  <g class="node c-teal" onclick="sendPrompt('确认信息无误后如何修改客户类别并开户？')">
    <rect x="470" y="192" width="188" height="60" rx="8" stroke-width="0.5"/>
    <text class="th" x="564" y="210" text-anchor="middle" dominant-baseline="central">修改客人类别</text>
    <text class="ts" x="564" y="228" text-anchor="middle" dominant-baseline="central">至 distributor</text>
    <text class="ts" x="564" y="244" text-anchor="middle" dominant-baseline="central">同意开户</text>
  </g>

  <line x1="564" y1="252" x2="564" y2="320" stroke="#5DCAA5" stroke-width="1"/>
  <line x1="564" y1="320" x2="400" y2="320" stroke="#5DCAA5" stroke-width="1" marker-end="url(#a2)"/>

  <g class="node c-teal">
    <ellipse cx="340" cy="360" rx="120" ry="26" stroke-width="0.5"/>
    <text class="th" x="340" y="352" text-anchor="middle" dominant-baseline="central">客户账户已开通</text>
    <text class="ts" x="340" y="370" text-anchor="middle" dominant-baseline="central">可进入下单流程</text>
  </g>

</svg>
</div>

<!-- TAB 3 -->
<div class="panel" id="tab-fulfil">
<svg width="100%" viewBox="0 0 680 580" role="img">
  <title>订单处理履行流程</title>
  <desc>打印invoice后，根据客户要求发邮件或交仓库备货。</desc>
  <defs>
    <marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <g class="node c-purple" onclick="sendPrompt('订单截图发给YU需要确认哪些信息？')">
    <rect x="190" y="20" width="300" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">订单截图发给 YU</text>
    <text class="ts" x="340" y="60" text-anchor="middle" dominant-baseline="central">确认配送/产品/数量/PO</text>
  </g>

  <line x1="340" y1="72" x2="340" y2="104" stroke="#AFA9EC" stroke-width="1" marker-end="url(#a3)"/>

  <g class="node c-teal" onclick="sendPrompt('加入客人备注时需注意什么？')">
    <rect x="220" y="106" width="240" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="126" text-anchor="middle" dominant-baseline="central">加入客人备注</text>
    <text class="ts" x="340" y="144" text-anchor="middle" dominant-baseline="central">检查特殊要求</text>
  </g>

  <line x1="340" y1="154" x2="340" y2="186" stroke="#5DCAA5" stroke-width="1" marker-end="url(#a3)"/>

  <g class="node c-gray" onclick="sendPrompt('invoice和packing slip各打几张，用途是什么？')">
    <rect x="220" y="188" width="240" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="208" text-anchor="middle" dominant-baseline="central">打印 2/3 张</text>
    <text class="ts" x="340" y="226" text-anchor="middle" dominant-baseline="central">invoice / packing slip</text>
  </g>

  <line x1="340" y1="236" x2="340" y2="272" stroke="#B4B2A9" stroke-width="1" marker-end="url(#a3)"/>

  <!-- Decision -->
  <polygon points="340,274 448,316 340,358 232,316" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="th" x="340" y="308" text-anchor="middle" dominant-baseline="central" fill="#444441">客户</text>
  <text class="th" x="340" y="326" text-anchor="middle" dominant-baseline="central" fill="#444441">特殊要求？</text>

  <!-- Left -->
  <line x1="232" y1="316" x2="106" y2="316" stroke="#B4B2A9" stroke-width="1" marker-end="url(#a3)"/>
  <text class="ts" x="166" y="306" text-anchor="middle" fill="#5F5E5A">需要</text>

  <g class="node c-purple" onclick="sendPrompt('什么情况下需要把invoice发邮件给客人？')">
    <rect x="20" y="284" width="184" height="64" rx="8" stroke-width="0.5"/>
    <text class="th" x="112" y="306" text-anchor="middle" dominant-baseline="central">Invoice 发邮件</text>
    <text class="ts" x="112" y="324" text-anchor="middle" dominant-baseline="central">给客人</text>
    <text class="ts" x="112" y="340" text-anchor="middle" dominant-baseline="central">(自提单例外)</text>
  </g>

  <!-- Right -->
  <line x1="448" y1="316" x2="554" y2="316" stroke="#B4B2A9" stroke-width="1" marker-end="url(#a3)"/>
  <text class="ts" x="504" y="306" text-anchor="middle" fill="#5F5E5A">自提单</text>

  <g class="node c-teal" onclick="sendPrompt('自提单交给仓库需要附上什么？')">
    <rect x="456" y="278" width="196" height="76" rx="8" stroke-width="0.5"/>
    <text class="th" x="554" y="298" text-anchor="middle" dominant-baseline="central">拣货单交给仓库</text>
    <text class="ts" x="554" y="316" text-anchor="middle" dominant-baseline="central">附上纸条</text>
    <text class="ts" x="554" y="334" text-anchor="middle" dominant-baseline="central">备货完成</text>
  </g>

  <!-- Converge to end -->
  <line x1="112" y1="348" x2="112" y2="450" stroke="#AFA9EC" stroke-width="1"/>
  <line x1="554" y1="354" x2="554" y2="450" stroke="#5DCAA5" stroke-width="1"/>
  <line x1="112" y1="450" x2="290" y2="450" stroke="#AFA9EC" stroke-width="1" marker-end="url(#a3)"/>
  <line x1="554" y1="450" x2="390" y2="450" stroke="#5DCAA5" stroke-width="1" marker-end="url(#a3)"/>

  <g class="node c-gray">
    <ellipse cx="340" cy="490" rx="120" ry="26" stroke-width="0.5"/>
    <text class="th" x="340" y="482" text-anchor="middle" dominant-baseline="central">订单处理完成</text>
    <text class="ts" x="340" y="500" text-anchor="middle" dominant-baseline="central">等待配送 / 客户自提</text>
  </g>

  <line x1="340" y1="516" x2="340" y2="548" stroke="#B4B2A9" stroke-width="1" marker-end="url(#a3)"/>

  <g class="node c-teal">
    <ellipse cx="340" cy="558" rx="80" ry="16" stroke-width="0.5"/>
    <text class="th" x="340" y="558" text-anchor="middle" dominant-baseline="central">流程结束</text>
  </g>

</svg>
</div>

<script>
function showTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  el.classList.add('active');
}
</script>
