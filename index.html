<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DodoWheels | 自研系统平台 v6.0</title>
    <style>
        :root {
            --bg-dark: #000000;
            --card-bg: rgba(28, 28, 30, 0.6);
            --neon-blue: #007aff; 
            --text-main: #ffffff;
            --text-dim: #a1a1a6;
            /* 关键宽度变量，方便统一修改 */
            --side-width: 650px; 
            --login-form-width: 350px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- 动态背景 --- */
        .bg-blobs { position: absolute; inset: 0; z-index: -1; overflow: hidden; filter: blur(80px); opacity: 0.4; }
        .blob { position: absolute; border-radius: 50%; animation: blobs_move 20s infinite alternate; }
        .b1 { width: 450px; height: 450px; background: var(--neon-blue); top: -10%; left: -10%; }
        .b2 { width: 550px; height: 550px; background: #0033ff; bottom: -10%; right: -10%; animation-delay: -5s; }
        @keyframes blobs_move { from { transform: translate(0,0); } to { transform: translate(100px, 100px); } }

        /* --- 登录页卡片 (调宽整体以容纳大图) --- */
        #login-wrapper {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
            z-index: 1000; background: #000; transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .login-card {
            display: flex; 
            width: 1000px; /* 保持总宽度，改变内部比例 */
            height: 600px; 
            background: rgba(10,10,10,0.9);
            border: 1px solid rgba(0, 122, 255, 0.2); 
            border-radius: 40px; 
            overflow: hidden;
            box-shadow: 0 0 100px rgba(0, 122, 255, 0.1); 
            backdrop-filter: blur(30px);
        }

        /* --- 左侧大图轮播区 --- */
        .anim-side {
            width: var(--side-width); 
            background: #000; 
            position: relative; 
            overflow: hidden;
        }
        
        .anim-side::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to right, transparent 70%, rgba(0,0,0,0.9));
            z-index: 2;
        }

        #gallery-scroller {
            display: flex;
            height: 100%;
            transition: transform 1.2s cubic-bezier(0.65, 0, 0.35, 1);
            will-change: transform;
            z-index: 1;
        }

        .gallery-item {
            flex-shrink: 0;
            width: var(--side-width);
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.9);
        }

        /* --- 右侧登录表单 (缩小并紧凑化) --- */
        .login-form-area {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center; /* 居中内容 */
            background: linear-gradient(135deg, rgba(15,15,15,0.5), rgba(0,0,0,0.8));
        }

        .login-content-box {
            width: 100%;
            max-width: 280px; /* 限制输入区域宽度 */
            text-align: center;
        }

        .login-content-box h1 {
            font-size: 24px;
            margin-bottom: 30px;
            letter-spacing: 1px;
            font-weight: 800;
            line-height: 1.2;
        }

        #code-input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0,122,255,0.3);
            padding: 15px;
            border-radius: 15px;
            color: var(--neon-blue);
            font-size: 22px;
            text-align: center;
            letter-spacing: 10px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        #code-input:focus {
            border-color: var(--neon-blue);
            background: rgba(0,122,255,0.1);
            box-shadow: 0 0 20px rgba(0,122,255,0.2);
        }

        .unlock-btn {
            width: 100%;
            background: var(--neon-blue);
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .unlock-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,122,255,0.4);
        }

        /* --- Portal 基础样式 (保持简略以节省空间) --- */
        #portal-section { width: 100%; max-width: 1400px; padding: 20px; display: none; flex-direction: column; gap: 20px; }
        /* ... 其他 Portal 样式同前 ... */
        .header { display: flex; justify-content: space-between; align-items: center; }
        .dashboard-banner { background: rgba(0, 122, 255, 0.08); border: 1px solid rgba(0, 122, 255, 0.2); border-radius: 25px; padding: 20px; display: flex; justify-content: space-around; backdrop-filter: blur(10px); }
        .major-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; }
        .major-card { padding: 20px; border-radius: 25px; text-align: center; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .major-card:hover { transform: translateY(-5px); border-color: var(--neon-blue); }
        .admin-panel { background: var(--card-bg); border-radius: 30px; padding: 20px; max-height: 40vh; overflow: hidden; }
        .app-scroller { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; overflow-y: auto; height: 300px; }
        .app-item { padding: 10px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="bg-blobs"><div class="blob b1"></div><div class="blob b2"></div></div>

    <div id="login-wrapper">
        <div class="login-card">
            <div class="anim-side">
                <div id="gallery-scroller"></div>
            </div>

            <div class="login-form-area">
                <div class="login-content-box">
                    <h1>DodoWheels<br><span style="color:var(--neon-blue); font-size: 18px;">INTERNAL HUB</span></h1>
                    <input type="password" id="code-input" placeholder="••••" maxlength="4">
                    <button class="unlock-btn" onclick="handleLogin()">Unlock System</button>
                    <p style="margin-top: 20px; font-size: 10px; color: #444; letter-spacing: 1px;">AUTHORIZED ACCESS ONLY</p>
                </div>
            </div>
        </div>
    </div>

    <section id="portal-section">
        <div class="header">
            <div style="font-size: 22px; font-weight: 900;">DODOWHEELS <span style="color:var(--neon-blue)">HUB</span></div>
            <button onclick="handleLogout()" style="background:transparent; color:#ff3b30; border:1px solid #ff3b30; padding:5px 15px; border-radius:10px; cursor:pointer;">EXIT</button>
        </div>

        <div class="dashboard-banner">
            <div style="text-align:center"><div style="font-size:20px; font-weight:900; color:var(--neon-blue)">29</div><div style="font-size:10px; color:var(--text-dim)">TOTAL TOOLS</div></div>
            <div style="text-align:center"><div style="font-size:20px; font-weight:900;">V 6.0</div><div style="font-size:10px; color:var(--text-dim)">SYSTEM VERSION</div></div>
        </div>

        <div class="major-grid">
            <div class="major-card" onclick="window.open('https://dodo-drivers.vercel.app/')"><h3>派送管理</h3></div>
            <div class="major-card" onclick="window.open('https://dodo-tools.vercel.app/')"><h3>仓库管理</h3></div>
            <div class="major-card" onclick="window.open('https://dodolms.vercel.app/')"><h3>知识库</h3></div>
            <div class="major-card" onclick="window.open('https://dodo-cs.vercel.app/')"><h3>客服管理</h3></div>
            <div class="major-card" onclick="window.open('https://dodo-kpi.vercel.app/')"><h3>KPI中心</h3></div>
        </div>

        <div class="admin-panel">
            <div class="app-scroller">
                <div class="app-item">网站产品最新序号获取工具</div>
                <div class="app-item">网站产品价格更新工具</div>
                <div class="app-item">网站新增产品工具</div>
                <div class="app-item">QBO产品名称调整工具</div>
                <div class="app-item">QBO产品库存初始化工具</div>
                <div class="app-item">Dodo AI 小助手</div>
                <div class="app-item">集装箱处理工具</div>
                <div class="app-item">OCR识别工具</div>
            </div>
        </div>
    </section>

    <script>
        const rawImages = [
            'https://www.dodowheels.com/image/cache/catalog/DOUBLESTAR/DW02-2560x600.jpg',
            'https://www.dodowheels.com/image/cache/catalog/KAPSEN/KAPSEN%20RW501-2560x600.jpg',
            'https://www.dodowheels.com/image/cache/catalog/TESCHE%204S-2560x600.jpg',
            'https://www.dodowheels.com/image/cache/catalog/5334-Z%20performance-2560x600.jpg',
            'https://www.dodowheels.com/image/cache/catalog/5%20holes-2560x600.jpg'
        ];

        let currentIndex = 0;
        let scroller;
        const sideWidth = 650; // 对应 CSS 中的宽度

        function initCarousel() {
            scroller = document.getElementById('gallery-scroller');
            rawImages.forEach(url => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.style.backgroundImage = `url('${url}')`;
                scroller.appendChild(div);
            });

            // 无缝克隆
            const firstClone = scroller.firstElementChild.cloneNode(true);
            scroller.appendChild(firstClone);
            scroller.style.width = `${(rawImages.length + 1) * sideWidth}px`;

            setInterval(moveNext, 5000);
        }

        function moveNext() {
            currentIndex++;
            scroller.style.transition = "transform 1.2s cubic-bezier(0.65, 0, 0.35, 1)";
            scroller.style.transform = `translateX(${-currentIndex * sideWidth}px)`;

            setTimeout(() => {
                if (currentIndex >= rawImages.length) {
                    scroller.style.transition = "none";
                    currentIndex = 0;
                    scroller.style.transform = `translateX(0px)`;
                }
            }, 1200);
        }

        function handleLogin() {
            if(document.getElementById('code-input').value.toLowerCase() === 'dodo') {
                document.getElementById('login-wrapper').style.opacity = '0';
                setTimeout(() => { 
                    document.getElementById('login-wrapper').style.display = 'none'; 
                    document.getElementById('portal-section').style.display = 'flex'; 
                }, 800);
            }
        }

        function handleLogout() {
            location.reload(); // 简单重载回到登录页
        }

        window.onload = initCarousel;
    </script>
</body>
</html>
