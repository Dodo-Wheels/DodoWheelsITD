<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DodoWheels | Unified OS</title>
    <style>
        :root {
            --bg-color: #020205;
            --primary-blue: #00f2fe;
            --secondary-purple: #7300ff;
            --accent-orange: #ff8c00;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #8b9bb4;
            --font-family: 'SF Pro Display', -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 背景层 */
        #bg-canvas {
            position: absolute;
            top: 0; left: 0; z-index: 1;
            opacity: 0.6;
        }

        .glow-overlay {
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 242, 254, 0.05) 0%, transparent 80%);
            z-index: 2;
            pointer-events: none;
        }

        /* 统一容器 */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- 登录视图 --- */
        #login-view {
            width: 450px;
            padding: 50px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            backdrop-filter: blur(25px);
            text-align: center;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .login-logo {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(to right, var(--primary-blue), #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }

        .input-box {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 18px;
            letter-spacing: 6px;
            text-align: center;
            margin-bottom: 25px;
            transition: 0.3s;
        }

        .input-box:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }

        .btn-auth {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-purple));
            color: #000;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-auth:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* --- 门户视图 (初始隐藏) --- */
        #portal-view {
            display: none;
            flex-direction: column;
            width: 100%;
            opacity: 0;
            transform: translateY(40px);
            transition: all 1s ease;
        }

        .portal-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .portal-header h1 {
            font-size: 42px;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .portal-header p {
            color: var(--text-dim);
            font-size: 18px;
        }

        .systems-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            backdrop-filter: blur(15px);
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-15px);
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.2);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--theme-color);
        }

        .card h2 { font-size: 22px; margin-bottom: 15px; }
        .card p { color: var(--text-dim); font-size: 14px; line-height: 1.6; }

        .lang-control {
            position: absolute;
            top: 40px; right: 40px;
            display: flex; gap: 10px;
        }

        .lang-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .lang-btn.active { background: var(--primary-blue); color: black; }

        /* 动画类 */
        .fade-out { opacity: 0; transform: scale(0.8) rotateX(20deg); pointer-events: none; }
        .fade-in { display: flex !important; opacity: 1 !important; transform: translateY(0) !important; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        @media (max-width: 900px) {
            .systems-grid { grid-template-columns: 1fr; padding: 20px; }
            #portal-view { overflow-y: auto; height: 100vh; justify-content: flex-start; padding-top: 100px; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="glow-overlay"></div>

    <div class="container">
        
        <div id="login-view">
            <div class="login-logo">DodoWheels OS</div>
            <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 20px;">SECURITY PROTOCOL ACTIVE</p>
            <input type="password" id="code-input" class="input-box" placeholder="ACCESS CODE">
            <button class="btn-auth" onclick="validate()">验证进入</button>
            <p id="hint" style="color: #ff3b3b; font-size: 12px; margin-top: 15px; display: none;">ACCESS DENIED: INVALID CODE</p>
        </div>

        <div id="portal-view">
            <div class="lang-control">
                <button class="lang-btn active" onclick="setLang('zh', this)">ZH</button>
                <button class="lang-btn" onclick="setLang('en', this)">EN</button>
                <button class="lang-btn" onclick="setLang('fr', this)">FR</button>
            </div>

            <div class="portal-header">
                <h1 id="title">数字生态系统门户</h1>
                <p id="subtitle">集成化智能管理中心</p>
            </div>

            <div class="systems-grid">
                <div class="card" style="--theme-color: var(--primary-blue);">
                    <div style="font-size: 32px; margin-bottom: 15px;">🚚</div>
                    <h2 id="sys1-t">DodoWheels-派送系统</h2>
                    <p id="sys1-d">实时物流追踪、智能路径规划、运力调度与终端签收管理。</p>
                </div>

                <div class="card" style="--theme-color: var(--secondary-purple);">
                    <div style="font-size: 32px; margin-bottom: 15px;">📦</div>
                    <h2 id="sys2-t">DodoWheels-仓管系统</h2>
                    <p id="sys2-d">数字化库存控制、全自动盘点与空间优化，实现仓储透明化。</p>
                </div>

                <div class="card" style="--theme-color: var(--accent-orange);">
                    <div style="font-size: 32px; margin-bottom: 15px;">🎓</div>
                    <h2 id="sys3-t">DodoWheels-学习系统</h2>
                    <p id="sys3-d">员工在线培训、岗位技能考核与职业发展规划，打造学习型组织。</p>
                </div>
            </div>

            <footer style="text-align: center; margin-top: 60px; font-size: 12px; color: rgba(255,255,255,0.1);">
                DODOWHEELS ADVANCED TECHNOLOGY TERMINAL © 2026
            </footer>
        </div>

    </div>

    <script>
        // 登录验证逻辑
        function validate() {
            const input = document.getElementById('code-input');
            const loginView = document.getElementById('login-view');
            const portalView = document.getElementById('portal-view');
            const hint = document.getElementById('hint');

            if (input.value.toLowerCase() === 'dodo') {
                // 成功：执行切换动画
                loginView.classList.add('fade-out');
                setTimeout(() => {
                    loginView.style.display = 'none';
                    portalView.classList.add('fade-in');
                }, 800);
            } else {
                // 失败：执行抖动动画
                hint.style.display = 'block';
                loginView.style.animation = 'shake 0.4s';
                setTimeout(() => { loginView.style.animation = ''; }, 400);
            }
        }

        // 多语言配置
        const i18n = {
            zh: {
                title: "数字生态系统门户", subtitle: "集成化智能管理中心",
                s1t: "DodoWheels-派送系统", s1d: "实时物流追踪、智能路径规划、运力调度与终端签收管理。",
                s2t: "DodoWheels-仓管系统", s2d: "数字化库存控制、全自动盘点与空间优化，实现仓储透明化。",
                s3t: "DodoWheels-学习系统", s3d: "员工在线培训、岗位技能考核与职业发展规划，打造学习型组织。"
            },
            en: {
                title: "Ecosystem Portal", subtitle: "Integrated Intelligent Management Center",
                s1t: "DodoWheels-Delivery", s1d: "Real-time tracking, AI routing, and smart fleet dispatch management.",
                s2t: "DodoWheels-Warehouse", s2d: "Digital inventory control, automated auditing, and space optimization.",
                s3t: "DodoWheels-Learning", s3d: "Online training, skill assessment, and career development planning."
            },
            fr: {
                title: "Portail d'Écosystème", subtitle: "Centre de Gestion Intelligente Intégré",
                s1t: "DodoWheels-Livraison", s1d: "Suivi en temps réel, routage IA et gestion de flotte intelligente.",
                s2t: "DodoWheels-Entrepôt", s2d: "Contrôle des stocks, audit automatisé et optimisation d'espace.",
                s3t: "DodoWheels-Apprentissage", s3d: "Formation en ligne, évaluation et planification de carrière."
            }
        };

        function setLang(lang, btn) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            document.getElementById('title').innerText = i18n[lang].title;
            document.getElementById('subtitle').innerText = i18n[lang].subtitle;
            document.getElementById('sys1-t').innerText = i18n[lang].s1t;
            document.getElementById('sys1-d').innerText = i18n[lang].s1d;
            document.getElementById('sys2-t').innerText = i18n[lang].s2t;
            document.getElementById('sys2-d').innerText = i18n[lang].s2d;
            document.getElementById('sys3-t').innerText = i18n[lang].s3t;
            document.getElementById('sys3-d').innerText = i18n[lang].s3d;
        }

        // 背景粒子 Canvas
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 242, 254, 0.4)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) particles.push(new Particle());

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', resize);
        resize();
        loop();
    </script>
</body>
</html>
