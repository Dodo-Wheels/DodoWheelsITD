<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DodoWheels | In-house Access Platform</title>
    <style>
        /* 定义品牌颜色 */
        :root {
            --brand-blue: #00f2fe; /* 您要求的蓝色 */
            --bg-dark: #0a0a0a;
            --text-dim: #737373;
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-dark); 
            font-family: -apple-system, system-ui, sans-serif; 
            height: 100vh; display: flex; justify-content: center; align-items: center; 
        }

        /* 外部大卡片 */
        .card { 
            display: flex; width: 850px; height: 480px; 
            background: #000; border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 40px; box-shadow: 0 40px 100px rgba(0,0,0,0.8); overflow: hidden; 
        }

        /* 黑客雨动画左侧 */
        .card-left { 
            flex: 1; position: relative; border-right: 1px solid #333; overflow: hidden; 
        }
        #hacker-bg { position: absolute; inset: 0; opacity: 0.8; }
        .branding { 
            position: absolute; bottom: 30px; left: 30px; font-family: monospace; 
            font-size: 11px; color: var(--text-dim); line-height: 1.8; 
        }

        /* 登录表单右侧 */
        .card-right { 
            flex: 1.2; padding: 60px 50px; display: flex; flex-direction: column; justify-content: center; 
        }

        /* 标题 - 使用蓝色并分两行 */
        .title { 
            color: var(--brand-blue); 
            font-size: 30px; font-weight: 800; line-height: 1.2; letter-spacing: -1px; margin-bottom: 8px; 
        }
        
        .subtitle { color: var(--text-dim); font-size: 13px; text-transform: uppercase; margin-bottom: 30px; }

        /* 输入框 - 高级毛玻璃 */
        .input-box { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 18px; padding: 22px; margin-bottom: 25px; 
            display: flex; gap: 20px; justify-content: center; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); 
        }
        .input-box .dot { width: 8px; height: 8px; background: #333; border-radius: 50%; }

        /* 按钮 - 使用蓝色且不拉伸 */
        .btn-wrapper { display: flex; justify-content: start; }
        .btn-sign-in { 
            background: var(--brand-blue); border: none; 
            color: #000; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; 
            padding: 16px 50px; border-radius: 12px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; 
        }
        .btn-sign-in:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3); }

    </style>
</head>
<body>

    <div class="card">
        <div class="card-left">
            <canvas id="hacker-bg"></canvas>
            <div class="branding">
                > DODO_CMD: SECURITY_INITIALIZED<br>
                > NODE: HUB-GLOBAL-OS-V9<br>
                > ENCRYPTION: AES-256 ACTIVE
            </div>
        </div>
        <div class="card-right">
            <div class="title">
                DodoWheels<br>自研系统平台
            </div>
            <div class="subtitle">INTERNAL ACCESS PLATFORM</div>
            
            <div class="input-box">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <div class="btn-wrapper">
                <button class="btn-sign-in">SIGN IN</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('hacker-bg');
        const ctx = canvas.getContext('2d');
        const fontSize = 15;
        const columns = Math.floor(350 / fontSize);
        const drops = Array(columns).fill(1);
        const letters = "01Dod0WHEELS";

        function drawHackerRain() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, 350, 480);
            ctx.fillStyle = "#00f2fe"; /* 使用蓝色黑客雨 */
            ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, y * fontSize);
                if(y * fontSize > 480 && Math.random() > 0.98) drops[i] = 0;
                drops[i]++;
            });
        }

        function resizeHackerCanvas() {
            canvas.width = 350;
            canvas.height = 480;
        }

        window.addEventListener('load', () => {
            resizeHackerCanvas();
            setInterval(drawHackerRain, 33);
        });
    </script>
</body>
</html>
