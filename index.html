<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DodoWheels | 身份验证终端</title>
    <style>
        :root {
            --bg-color: #010103;
            --primary-geo: #00f2fe; /* 青色 - 派送/科技 */
            --primary-light: rgba(0, 242, 254, 0.2);
            --error-color: #ff3b3b;
            --success-color: #00ff88;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            --webkit-font-smoothing: antialiased;
        }

        /* --- 背景 3D 地球（Canvas 模拟） --- */
        #globe-canvas {
            position: absolute;
            left: -10%;
            top: 50%;
            transform: translateY(-50%);
            width: 60vh;
            height: 60vh;
            opacity: 0.4;
            z-index: 1;
        }

        /* --- 背景氛围光圈 --- */
        .ambient-glow {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background: 
                radial-gradient(circle at 10% 50%, rgba(0, 242, 254, 0.15) 0%, rgba(0,0,0,0) 40%),
                radial-gradient(circle at 90% 10%, rgba(115, 0, 255, 0.1) 0%, rgba(0,0,0,0) 30%);
            z-index: 0;
        }

        /* --- 主登录容器 (Glassmorphism) --- */
        .login-master-container {
            position: relative;
            z-index: 10;
            display: flex;
            width: 900px;
            height: 550px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        /* --- 左侧：品牌与状态展示 --- */
        .login-info-section {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
        }

        .brand-logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .brand-logo::before {
            content: '';
            display: inline-block;
            width: 15px;
            height: 15px;
            background: var(--primary-geo);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary-geo);
        }

        .terminal-status {
            font-family: 'Courier New', Courier, monospace; /* 模拟终端字体 */
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.8;
        }

        .status-line { display: block; opacity: 0; animation: typeIn 0.5s forwards; }
        .status-line:nth-child(1) { animation-delay: 0.2s; }
        .status-line:nth-child(2) { animation-delay: 0.4s; }
        .status-line:nth-child(3) { animation-delay: 0.6s; }
        .status-line:nth-child(4) { animation-delay: 0.8s; color: var(--primary-geo); }

        @keyframes typeIn {
            to { opacity: 1; transform: translateY(0); }
            from { opacity: 0; transform: translateY(5px); }
        }

        /* --- 右侧：验证交互区域 --- */
        .login-auth-section {
            flex: 1.2;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
        }

        .auth-header {
            margin-bottom: 40px;
        }

        .auth-header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(180deg, #fff 0%, #bbb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 300;
        }

        /* --- 输入区域 --- */
        .input-group {
            width: 100%;
            position: relative;
            margin-bottom: 20px;
        }

        .input-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary-geo);
            margin-bottom: 8px;
            display: block;
            margin-left: 5px;
        }

        .geo-input {
            width: 100%;
            padding: 18px 25px;
            font-size: 18px;
            letter-spacing: 5px; /* 密码感 */
            font-family: 'Courier New', Courier, monospace;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        .geo-input:focus {
            border-color: var(--primary-geo);
            background: rgba(0, 242, 254, 0.03);
            box-shadow: 0 0 15px var(--primary-light);
        }

        /* 错误状态 */
        .input-group.error .geo-input {
            border-color: var(--error-color);
            box-shadow: 0 0 15px rgba(255, 59, 59, 0.2);
            animation: shake 0.4s ease;
        }

        /* 成功状态 */
        .input-group.success .geo-input {
            border-color: var(--success-color);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        /* --- 生物识别模拟区 (高大上核心) --- */
        .biometric-area {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .biometric-icon {
            width: 40px;
            height: 40px;
            transition: all 0.3s ease;
        }

        .biometric-icon svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: var(--text-muted);
            stroke-width: 1;
        }

        .biometric-text {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* 生物识别激活/错误状态 */
        .input-group.error + .biometric-area .biometric-icon svg { stroke: var(--error-color); }
        .input-group.success + .biometric-area .biometric-icon svg { stroke: var(--success-color); }
        .input-group.success + .biometric-area .biometric-icon { animation: pulse 1s infinite; }

        /* --- 登录按钮 --- */
        .login-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #000;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 50%, #7300ff 100%);
            background-size: 200% auto;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            background-position: right center;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
            transform: translateY(-2px);
        }

        .login-btn:active { transform: translateY(1px); }

        /* 按钮加载/成功状态 */
        .login-btn.processing { pointer-events: none; opacity: 0.7; color: rgba(0,0,0,0.5); }
        .login-btn.success { background: var(--success-color); color: #000; box-shadow: 0 0 30px rgba(0, 255, 136, 0.5); }

        /* 页脚版权 */
        .login-footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 10px;
            color: rgba(255,255,255,0.15);
            letter-spacing: 1px;
            z-index: 5;
        }

        /* --- 动画关键帧 --- */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }

        /* --- 响应式适配 --- */
        @media (max-width: 950px) {
            .login-master-container { width: 90%; flex-direction: column; height: auto; }
            .login-info-section { border-right: none; border-bottom: 1px solid var(--glass-border); padding: 30px; }
            #globe-canvas { display: none; }
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>
    <canvas id="globe-canvas"></canvas>

    <main class="login-master-container">
        
        <section class="login-info-section">
            <div class="brand-logo">DodoWheels</div>
            
            <div class="terminal-status">
                <span class="status-line">> INIT TERMINAL PROTOCOL... [OK]</span>
                <span class="status-line">> ESTABLISHING SECURE LINK... [OK]</span>
                <span class="status-line">> AWAITING ACCESS CODE...</span>
                <span class="status-line">> SYSTEM: DODOWHEELS ECOSYSTEM</span>
            </div>
        </section>

        <section class="login-auth-section">
            <div class="auth-header">
                <h1>身份验证</h1>
                <p>请输入您的安全访问码以继续</p>
            </div>

            <div class="input-group" id="input-group">
                <label class="input-label" for="access-code">Access Code</label>
                <input type="password" id="access-code" class="geo-input" placeholder="••••" maxlength="10">
            </div>

            <div class="biometric-area">
                <div class="biometric-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M7 10.5V6.5a2.5 2.5 0 0 1 5 0v4m-5 0h5m-5 0a3.5 3.5 0 1 1 7 0v1.5m0-1.5v-1a2.5 2.5 0 0 1 5 0v2.5M12 12v1.5m0-1.5a3.5 3.5 0 1 1 7 0v1.5m-7-1.5V6.5a1.5 1.5 0 0 0-3 0v4m3 0V12" stroke-linecap="round"/>
                        <path d="M12 21.5c-4 0-7-2.5-7-6v-1.5h14v1.5c0 3.5-3 6-7 6Z"/>
                    </svg>
                </div>
                <div class="biometric-text">
                    <span style="color:white; font-weight:600;">模拟生物感应</span><br>
                    需配合访问码进行多重协议校验
                </div>
            </div>

            <button class="login-btn" id="login-btn">验证访问权限</button>

        </section>
    </main>

    <footer class="login-footer">
        SECURE ACCESS TERMINAL v2.1 | DODOWHEELS TECHNOLOGY
    </footer>

    <script>
        // --- 核心登录逻辑 ---
        const accessCodeInput = document.getElementById('access-code');
        const loginBtn = document.getElementById('login-btn');
        const inputGroup = document.getElementById('input-group');

        // 正确的访问码
        const VALID_CODE = 'dodo';

        loginBtn.addEventListener('click', performLogin);

        // 支持回车键登录
        accessCodeInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') performLogin();
        });

        function performLogin() {
            const code = accessCodeInput.value.trim().toLowerCase(); // 统一转小写

            // 清除之前的状态
            inputGroup.classList.remove('error', 'success');
            loginBtn.innerText = "验证访问权限";
            loginBtn.classList.remove('processing', 'success');

            if (!code) {
                showError("请输入访问码");
                return;
            }

            // 模拟验证过程 (高大上需要有一点点延迟)
            loginBtn.innerText = "正在校验...";
            loginBtn.classList.add('processing');

            setTimeout(() => {
                if (code === VALID_CODE) {
                    showSuccess();
                } else {
                    showError("访问码无效，安全协议已启动");
                }
            }, 1200); // 1.2秒延迟模拟
        }

        function showError(msg) {
            inputGroup.classList.add('error');
            loginBtn.innerText = "验证失败";
            loginBtn.classList.remove('processing');
            accessCodeInput.value = ''; // 清空输入
            accessCodeInput.focus();

            // 3秒后尝试恢复按钮文字，但保持红色
            setTimeout(() => {
                if(inputGroup.classList.contains('error'))
                    loginBtn.innerText = "重试身份验证";
            }, 3000);
        }

        function showSuccess() {
            inputGroup.classList.add('success');
            loginBtn.classList.remove('processing');
            loginBtn.classList.add('success');
            loginBtn.innerText = "验证通过 / 正在接入...";

            // 模拟门户系统接入动画，随后跳转
            setTimeout(() => {
                // 跳转到您的门户主页 (请确保 portal.html 文件存在)
                window.location.href = 'portal.html'; 
            }, 1500);
        }


        // --- 背景 3D 地球模拟脚本 (Canvas) ---
        // 这是一个简单的点阵地球模拟，用于增加科技感，实际生产可用Three.js
        const canvas = document.getElementById('globe-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function setCanvasSize() {
            width = canvas.width = canvas.parentElement.offsetHeight * 0.6;
            height = canvas.height = canvas.parentElement.offsetHeight * 0.6;
        }

        const points = [];
        const numPoints = 250;
        const radius = width * 0.45 || 150;

        // 初始化点
        for (let i = 0; i < numPoints; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI;
            points.push({
                x: radius * Math.sin(phi) * Math.cos(theta),
                y: radius * Math.sin(phi) * Math.sin(theta),
                z: radius * Math.cos(phi),
                originalRadius: radius * (0.95 + Math.random() * 0.1) // 轻微震动感
            });
        }

        let angle = 0;

        function drawGlobe() {
            ctx.clearRect(0, 0, width, height);
            ctx.translate(width / 2, height / 2);

            angle += 0.003; // 旋转速度

            points.forEach(p => {
                // 旋转变换
                const x1 = p.x * Math.cos(angle) - p.z * Math.sin(angle);
                const z1 = p.x * Math.sin(angle) + p.z * Math.cos(angle);
                
                // 透视投影
                const perspective = 300 / (300 + z1);
                const screenX = x1 * perspective;
                const screenY = p.y * perspective;

                // 绘制点，根据深度设置透明度和大小
                const opacity = (z1 + radius) / (2 * radius); // 前亮后暗
                ctx.beginPath();
                ctx.arc(screenX, screenY, perspective * 1.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 242, 254, ${opacity * 0.5})`;
                ctx.fill();
                
                // 偶而绘制连接线条增加科技感
                if(Math.random() < 0.02 && z1 > 0) {
                     ctx.beginPath();
                     ctx.moveTo(screenX, screenY);
                     ctx.lineTo(screenX + (Math.random()-0.5)*10, screenY + (Math.random()-0.5)*10);
                     ctx.strokeStyle = `rgba(0, 242, 254, 0.1)`;
                     ctx.lineWidth = 0.5;
                     ctx.stroke();
                }
            });

            ctx.translate(-width / 2, -height / 2);
            requestAnimationFrame(drawGlobe);
        }

        window.addEventListener('resize', setCanvasSize);
        setCanvasSize();
        drawGlobe();

    </script>
</body>
</html>
