<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>公司整体业务流程全景图</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef3f8;
  --card:#ffffff;
  --line:#d6deea;
  --text:#172033;
  --muted:#65718a;
  --shadow:0 24px 60px rgba(20,33,61,.12);
  --shadow-soft:0 12px 28px rgba(20,33,61,.09);
}
body{
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.98), rgba(234,242,250,.9) 28%, rgba(238,243,248,1) 70%),
    linear-gradient(180deg,#f8fbff 0%,#eef3f8 46%,#e9eef5 100%);
  color:var(--text);
  font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
}
.page{
  width:min(100%,1920px);
  margin:0 auto;
  padding:12px 14px 16px;
}
.header{margin-bottom:12px}
.title{
  font-size:30px;
  font-weight:800;
  letter-spacing:.03em;
  text-align:center;
  color:#11203f;
  text-shadow:0 1px 0 rgba(255,255,255,.8);
}
.legend{
  display:grid;
  gap:7px;
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid #ece8dc;
}
.legend-title{
  font-size:11px;
  font-weight:700;
  color:#777;
  letter-spacing:.04em;
  text-transform:uppercase;
}
.li{display:flex;align-items:center;gap:6px;font-size:11px;color:#555;line-height:1.4}
.lc{width:10px;height:10px;border-radius:3px;flex-shrink:0}

.layout{
  display:grid;
  grid-template-columns:182px minmax(0,1fr) 296px;
  gap:10px;
  align-items:stretch;
}
.side,.chart-wrap,.detail{
  background:linear-gradient(180deg,rgba(255,255,255,.92) 0%,rgba(249,252,255,.88) 100%);
  border:1px solid rgba(201,214,231,.8);
  border-radius:22px;
  box-shadow:var(--shadow);
}
.side{
  padding:12px;
  position:sticky;
  top:12px;
  min-height:calc(100vh - 126px);
  display:flex;
  flex-direction:column;
}
.side h2{
  font-size:13px;
  margin-bottom:10px;
  color:#42516f;
  font-weight:800;
  letter-spacing:.08em;
}
.sbar{display:flex;flex-direction:column;gap:10px}
.sg{display:flex;flex-direction:column;gap:7px}
.sgt{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:100%;
  border:0;
  background:transparent;
  cursor:pointer;
  font-size:11px;
  font-weight:700;
  color:#7a869d;
  letter-spacing:.04em;
  text-transform:uppercase;
  padding:0 2px;
}
.sgt::after{
  content:"+";
  font-size:14px;
  line-height:1;
  color:#8a98b1;
}
.sg.open .sgt::after{
  content:"−";
}
.sgi{display:flex;flex-direction:column;gap:7px}
.sg.collapse .sgi{display:none}
.sg.open .sgi{display:flex}
.sb{
  width:100%;
  padding:10px 11px;
  border-radius:14px;
  border:1px solid #d8e1ee;
  background:linear-gradient(180deg,#ffffff 0%,#f7faff 100%);
  font-size:12px;
  line-height:1.35;
  cursor:pointer;
  color:#4b5870;
  text-align:left;
  transition:.18s ease
}
.sb:hover{
  transform:translateY(-1px);
  box-shadow:var(--shadow-soft);
  border-color:#bdd0ea;
}
.sb.on{color:#fff;border-color:transparent;font-weight:600}
.sb[data-s=all].on{background:linear-gradient(135deg,#1f2d4d 0%,#344f87 100%)}
.sb[data-s=s1].on{background:linear-gradient(135deg,#1565C0 0%,#4FA3FF 100%)}
.sb[data-s=s2].on{background:linear-gradient(135deg,#2E7D32 0%,#5ACB7A 100%)}
.sb[data-s=s3].on{background:linear-gradient(135deg,#E65100 0%,#FF9A52 100%)}
.sb[data-s=s4].on{background:linear-gradient(135deg,#AD1457 0%,#F06292 100%)}
.sb[data-s=s5].on{background:linear-gradient(135deg,#00695C 0%,#28B7A3 100%)}
.sb[data-s=s6].on{background:linear-gradient(135deg,#4527A0 0%,#8164F6 100%)}
.sb[data-s=s7].on{background:linear-gradient(135deg,#B71C1C 0%,#FF6A6A 100%)}
.sb[data-s=s8].on{background:linear-gradient(135deg,#F57F17 0%,#FFCB52 100%)}
.sb[data-s=s9].on{background:linear-gradient(135deg,#00838F 0%,#40C9D6 100%)}

.chart-wrap{
  padding:10px;
  overflow:hidden;
  min-height:calc(100vh - 126px);
  background:
    radial-gradient(circle at top, rgba(255,255,255,.86), rgba(255,255,255,0) 32%),
    linear-gradient(180deg,rgba(246,250,255,.98) 0%,rgba(236,243,251,.94) 100%);
}
svg{
  display:block;
  width:100%;
  height:auto;
  min-width:0;
  border-radius:18px;
  background:#ffffff;
  box-shadow:
    inset 0 0 0 1px rgba(214,224,238,.9),
    0 20px 40px rgba(28,42,70,.08);
}
.node-shell{
  fill:rgba(255,255,255,.96);
  stroke:rgba(201,214,231,.9);
  stroke-width:1;
  filter:url(#cardShadow);
}
.node-gloss{
  fill:url(#glossFill);
  opacity:.0;
  pointer-events:none;
}
.node-accent{
  fill:none;
  stroke:url(#accentStroke);
  stroke-width:1.4;
  opacity:0;
  pointer-events:none;
}
.nd rect{
  stroke-width:1.1;
}
.nd text{
  letter-spacing:.01em;
}
.nd{transition:opacity .18s ease,transform .18s ease}
.nd.dim{opacity:.12}
.nd.lit .node-shell{filter:url(#cardGlow)}
.nd.lit .node-gloss{opacity:.95}
.nd.lit .node-accent{opacity:1}
.nd.lit rect{filter:url(#nodeGlow)}
.eg{fill:none;stroke-width:1px;transition:stroke .15s,opacity .15s,stroke-width .15s}
.eg.dim{opacity:.08}
.eg.lit{
  stroke-width:3.2px;
  stroke-linecap:round;
  stroke-linejoin:round;
  filter:url(#flowGlow);
  stroke-dasharray:8 9;
  animation:flowMove 2.2s linear infinite;
}

@keyframes flowMove{
  from{stroke-dashoffset:34}
  to{stroke-dashoffset:0}
}

.detail{
  padding:10px 10px 12px;
  position:sticky;
  top:12px;
  align-self:start;
  max-height:calc(100vh - 24px);
  overflow:auto;
}
.detail-head{
  position:sticky;
  top:-10px;
  z-index:2;
  background:linear-gradient(180deg,rgba(255,255,255,.985) 0%,rgba(246,250,255,.96) 100%);
  padding:2px 2px 10px;
  border-bottom:1px solid #e3eaf5;
  margin-bottom:10px;
}
.colorbar{
  height:6px;
  border-radius:999px;
  margin-bottom:10px;
  background:linear-gradient(90deg,#16305f 0%,#4d8bff 100%);
  box-shadow:0 6px 16px rgba(77,139,255,.25);
}
.detail-title{font-size:17px;font-weight:700;line-height:1.35}
.detail-sub{margin-top:5px;color:#6f7c93;font-size:12px;line-height:1.65}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.metric{
  border:1px solid #dfe8f4;
  background:linear-gradient(180deg,#ffffff 0%,#f6faff 100%);
  border-radius:12px;
  padding:8px 9px;
}
.metric .k{font-size:10px;color:#7a869d;margin-bottom:4px}
.metric .v{font-size:14px;font-weight:700;color:#24334f;line-height:1.35}
.section-title{
  font-size:11px;
  font-weight:700;
  margin:12px 0 7px;
  color:#7d899f;
  letter-spacing:.04em;
  text-transform:uppercase;
}
.timeline{display:flex;flex-direction:column;gap:7px}
.step{
  display:flex;
  gap:8px;
  align-items:flex-start;
  padding:8px 8px 9px;
  border:1px solid #dfe8f4;
  border-left:3px solid #bfd1ea;
  border-radius:12px;
  background:linear-gradient(180deg,#ffffff 0%,#f7fbff 100%);
}
.no{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;flex-shrink:0}
.step-main{min-width:0;flex:1}
.step-text{font-size:11.5px;line-height:1.6;color:#333}
.badge{display:inline-block;margin-top:5px;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:600}
.notes{display:grid;gap:7px}
.note{
  padding:8px 9px;
  border-radius:12px;
  background:linear-gradient(180deg,#fbfdff 0%,#f4f8fd 100%);
  border:1px solid #dfe8f4;
  font-size:11.5px;
  line-height:1.62;
  color:#52627d;
}

@media (max-width:1360px){
  .layout{grid-template-columns:182px 1fr 278px}
}
@media (max-width:1220px){
  .layout{grid-template-columns:182px 1fr}
  .side{min-height:auto}
  .chart-wrap{min-height:auto}
  .detail{grid-column:1 / -1;position:static;max-height:none}
}
@media (max-width:900px){
  .layout{grid-template-columns:1fr}
  .side,.detail{position:static}
  .sbar{gap:12px}
  .sg{gap:6px}
  .sgi{flex-direction:row;flex-wrap:wrap;gap:7px}
  .sb{width:auto;white-space:nowrap}
  .summary-grid{grid-template-columns:1fr 1fr}
  .legend{grid-template-columns:1fr 1fr}
}
@media (max-width:640px){
  .page{padding:10px}
  .title{font-size:20px}
  .summary-grid{grid-template-columns:1fr}
  .legend{grid-template-columns:1fr}
}
</style>
</head>

function renderDetail(sc){
  const d=D[sc];
  document.getElementById('colorbar').style.background=d.c;
  document.getElementById('detailTitle').textContent=d.t;
  document.getElementById('detailSub').textContent=d.sub;

  const sg=document.getElementById('summaryGrid');
  sg.innerHTML='';
  d.metrics.forEach(([k,v])=>{
    const el=document.createElement('div');
    el.className='metric';
    el.innerHTML=`<div class="k">${k}</div><div class="v">${v}</div>`;
    sg.appendChild(el);
  });

  const tl=document.getElementById('timeline');
  tl.innerHTML='';
  d.steps.forEach((item,i)=>{
    const [text,label,bg,col]=item;
    const step=document.createElement('div');
    step.className='step';
    step.innerHTML=`<div class="no" style="background:${d.c}">${i+1}</div><div class="step-main"><div class="step-text">${text}</div><span class="badge" style="background:${bg};color:${col}">${label}</span></div>`;
    tl.appendChild(step);
  });

  const notes=document.getElementById('notes');
  notes.innerHTML='';
  d.notes.forEach(text=>{
    const el=document.createElement('div');
    el.className='note';
    el.textContent=text;
    notes.appendChild(el);
  });
}

function enhanceNodes(){
  document.querySelectorAll('.nd').forEach(group=>{
    if(group.querySelector('.node-shell')) return;
    const rect=group.querySelector('rect');
    if(!rect) return;
    const x=parseFloat(rect.getAttribute('x'));
    const y=parseFloat(rect.getAttribute('y'));
    const w=parseFloat(rect.getAttribute('width'));
    const h=parseFloat(rect.getAttribute('height'));
    const rx=parseFloat(rect.getAttribute('rx') || 4);
    const shell=document.createElementNS('http://www.w3.org/2000/svg','rect');
    shell.setAttribute('class','node-shell');
    shell.setAttribute('x',x-3);
    shell.setAttribute('y',y-3);
    shell.setAttribute('width',w+6);
    shell.setAttribute('height',h+6);
    shell.setAttribute('rx',rx+4);
    group.insertBefore(shell,rect);

    const gloss=document.createElementNS('http://www.w3.org/2000/svg','rect');
    gloss.setAttribute('class','node-gloss');
    gloss.setAttribute('x',x-1);
    gloss.setAttribute('y',y-1);
    gloss.setAttribute('width',w+2);
    gloss.setAttribute('height',Math.max(10,h*.48));
    gloss.setAttribute('rx',rx+2);
    group.insertBefore(gloss,rect);

    const accent=document.createElementNS('http://www.w3.org/2000/svg','rect');
    accent.setAttribute('class','node-accent');
    accent.setAttribute('x',x-.5);
    accent.setAttribute('y',y-.5);
    accent.setAttribute('width',w+1);
    accent.setAttribute('height',h+1);
    accent.setAttribute('rx',rx+2);
    group.appendChild(accent);
  });
}

function toggleGroup(id){
  const el=document.getElementById(id);
  if(el) el.classList.toggle('open');
}

function go(sc,btn){
  document.querySelectorAll('.sb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const ns=document.querySelectorAll('.nd');
  const es=document.querySelectorAll('.eg');

  if(sc==='all'){
    ns.forEach(n=>n.classList.remove('dim','lit'));
    es.forEach(e=>{e.classList.remove('dim','lit');e.style.stroke='';});
    renderDetail('all');
    return;
  }

  const col=D[sc].c;
  ns.forEach(n=>{
    const s=(n.dataset.scenes||'').split(' ');
    n.classList.toggle('dim',!s.includes(sc));
    n.classList.toggle('lit',s.includes(sc));
  });
  es.forEach(e=>{
    const s=(e.dataset.scenes||'').split(' ');
    if(s.includes(sc)){
      e.classList.remove('dim');
      e.classList.add('lit');
      e.style.stroke=col;
    }else{
      e.classList.remove('lit');
      e.classList.add('dim');
      e.style.stroke='';
    }
  });
  renderDetail(sc);
}

enhanceNodes();
renderDetail('all');
</script>
