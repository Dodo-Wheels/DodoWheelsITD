<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DodoWheels Digital Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --accent: #0a84ff;
            --text: #ffffff;
            --text-dim: #8e8e93;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 800px; }

        /* Header - 更加紧凑 */
        header { 
            display: flex; justify-content: space-between; align-items: center;
            margin: 20px 0 30px; border-left: 3px solid var(--accent); padding-left: 15px; 
        }
        h1 { font-size: 24px; margin: 0; letter-spacing: -0.5px; }
        .meta { color: var(--accent); font-size: 12px; font-weight: 600; }

        /* Dashboard - 横向紧凑排列 */
        .dashboard {
            display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 15px; margin-bottom: 30px;
        }
        
        .chart-container {
            background: var(--card); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 18px; height: 120px;
        }

        .stat-box {
            background: var(--card); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .stat-val { font-size: 24px; font-weight: 700; color: var(--accent); }
        .stat-lab { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; }

        /* 本周焦点卡片 */
        .focus-section { margin-bottom: 30px; }
        .section-label { font-size: 13px; color: var(--text-dim); margin-bottom: 12px; font-weight: 600; display: block;}
        
        .current-card {
            background: linear-gradient(145deg, #2c2c2e, #1c1c1e);
            border: 1px solid var(--accent);
            padding: 25px; border-radius: 24px; cursor: pointer;
            box-shadow: 0 10px 30px rgba(10, 132, 255, 0.15);
            transition: transform 0.2s;
        }
        .current-card:hover { transform: scale(1.01); }
        .current-card h2 { margin: 0 0 10px 0; font-size: 20px; }
        .current-card p { margin: 0; color: #d1d1d6; font-size: 14px; line-height: 1.6; }
        .badge-week { background: var(--accent); color: #fff; padding: 2px 8px; border-radius: 6px; font-size: 10px; margin-right: 8px; vertical-align: middle; }

        /* 历史记录 - 极简列表 */
        .history-list {
            background: var(--glass); border-radius: 18px; padding: 5px 15px;
        }
        .history-item {
            display: flex; justify-content: space-between; padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px;
        }
        .history-item:last-child { border-bottom: none; }
        .history-tag { color: var(--text-dim); font-family: monospace; }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #1c1c1e; width: 85%; max-width: 500px;
            padding: 35px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.1);
        }
        .close-btn { float: right; cursor: pointer; color: var(--text-dim); font-size: 20px; }

        footer { margin-top: 40px; text-align: center; color: var(--text-dim); font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>数字化构建中心</h1>
            <div class="meta">FRANK'S PORTFOLIO</div>
        </div>
        <div style="text-align: right; font-size: 12px; color: var(--text-dim);">
            2026.05.15 周五
        </div>
    </header>

    <div class="dashboard">
        <div class="chart-container">
            <canvas id="miniChart"></canvas>
        </div>
        <div class="stat-box">
            <span class="stat-val">230</span>
            <span class="stat-lab">交付倒计时[cite: 1]</span>
        </div>
        <div class="stat-box">
            <span class="stat-val">W01</span>
            <span class="stat-lab">当前迭代</span>
        </div>
    </div>

    <div class="focus-section">
        <span class="section-label">本周焦点 (CURRENT FOCUS)</span>
        <div class="current-card" onclick="openModal('week01')">
            <h2><span class="badge-week">LATEST</span> W01: 架构确立与 UI 建模</h2>
            <p>本周重点完成了项目启动会及三大核心系统（官网、WMS、QBO）的研发路径规划[cite: 1, 2]。</p>
        </div>
    </div>

    <div class="history-section">
        <span class="section-label">关键里程碑 (MILESTONES)</span>
        <div class="history-list">
            <div class="history-item">
                <span>项目启动会 (Kick-off Meeting)</span>
                <span class="history-tag">2026.05.10</span>
            </div>
            <!-- 未来历史项只需往这里添加，一行一个，非常省空间 -->
        </div>
    </div>

    <footer>
        DodoWheels IT Team © 2026
    </footer>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()">✕</span>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    const ctx = document.getElementById('miniChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['5.10', '5.11', '5.12', '5.13', '5.14', '5.15'],
            datasets: [{
                data: [0, 8, 15, 22, 28, 35],
                borderColor: '#0a84ff',
                borderWidth: 2,
                pointRadius: 0,
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(10, 132, 255, 0.1)'
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { display: false }, y: { display: false } }
        }
    });

    const reports = {
        week01: {
            title: "W01 详细摘要",
            content: `
                <p>项目自 5 月 10 日启动以来，本周完成如下核心事项：</p>
                <ul style="color:#d1d1d6; font-size:14px; line-height:1.8;">
                    <li><b>战略落地：</b> 明确 Frank 总监制，确立 12.31 交付红线[cite: 1]。</li>
                    <li><b>UI 建模：</b> 官网暗黑模式视觉规范 (DS) 确立。</li>
                    <li><b>接口测试：</b> Tim 完成了 QBO 财务系统的初步对接调试[cite: 1]。</li>
                </ul>
            `
        }
    };

    function openModal(id) {
        const r = reports[id];
        document.getElementById('modalBody').innerHTML = `<h3 style="color:var(--accent)">${r.title}</h3>${r.content}`;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
    }
</script>

</body>
</html>
