<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>公司整体业务流程全景图</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FAFAF8}
.w{display:flex;flex-direction:column;padding:8px 0 16px;background:#FAFAF8;font-family:var(--font-sans,sans-serif)}
.topbar{display:flex;flex-wrap:wrap;gap:5px 12px;padding:0 12px 10px;justify-content:center}
.main{display:flex;align-items:flex-start;gap:12px;padding:0 12px}
.scenes{width:178px;flex:0 0 178px;display:flex;flex-direction:column;gap:6px;padding:10px;background:#F3F2EE;border:1px solid #E2E0DA;border-radius:16px;position:sticky;top:12px}
.st{font-size:11px;font-weight:600;color:#666;padding:2px 4px 6px}
.sbar{display:flex;flex-direction:column;gap:6px}
.sb{padding:8px 10px;border-radius:13px;border:1.5px solid #ccc;background:#fff;font-size:11px;cursor:pointer;color:#555;text-align:left;transition:all .15s}
.sb.on{color:#fff;border-color:transparent}
.sb[data-s=all].on{background:#444}
.sb[data-s=s1].on{background:#1565C0}.sb[data-s=s2].on{background:#2E7D32}
.sb[data-s=s3].on{background:#E65100}.sb[data-s=s4].on{background:#AD1457}
.sb[data-s=s5].on{background:#00695C}.sb[data-s=s6].on{background:#4527A0}
.sb[data-s=s7].on{background:#B71C1C}.sb[data-s=s8].on{background:#F57F17}
.sb[data-s=s9].on{background:#00838F}
.canvas{min-width:0;flex:1;background:#FAFAF8}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:#555;white-space:nowrap}
.lc{width:9px;height:9px;border-radius:2px;flex-shrink:0}
svg{display:block;width:100%;height:auto}
.nd{transition:opacity .18s}.nd.dim{opacity:.1}.nd.lit rect{filter:drop-shadow(0 1px 4px rgba(0,0,0,.22))}
.eg{fill:none;stroke-width:1px;transition:stroke .15s,opacity .15s,stroke-width .15s}
.eg.dim{opacity:.07}.eg.lit{stroke-width:2.5px}
.mbd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:300;align-items:center;justify-content:center}
.mbd.on{display:flex}
.mpanel{background:#fff;border-radius:12px;padding:20px 24px 24px;max-width:480px;width:92%;max-height:78vh;overflow-y:auto;position:relative;box-shadow:0 8px 28px rgba(0,0,0,.2)}
.mcl{position:absolute;top:10px;right:14px;font-size:22px;cursor:pointer;color:#999;border:none;background:none;line-height:1}
.mbar{height:4px;border-radius:2px;margin-bottom:14px}
.mpanel h3{font-size:13px;font-weight:500;margin-bottom:10px;padding-right:22px}
.mpanel ol{padding-left:18px;font-size:12px;line-height:1.9;color:#333}
.mpanel li{margin-bottom:3px}
.tag{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:500;margin-left:3px;vertical-align:middle}
@media (max-width: 980px){
  .main{flex-direction:column}
  .scenes{width:100%;flex:none;position:static}
  .sbar{flex-direction:row;flex-wrap:wrap}
  .sb{white-space:nowrap}
}
</style>
</head>

};
function go(sc,btn){
  document.querySelectorAll('.sb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const ns=document.querySelectorAll('.nd'),es=document.querySelectorAll('.eg');
  if(sc==='all'){
    ns.forEach(n=>{n.classList.remove('dim','lit')});
    es.forEach(e=>{e.classList.remove('dim','lit');e.style.stroke=''});
    return;
  }
  const col=D[sc].c;
  ns.forEach(n=>{const s=(n.dataset.scenes||'').split(' ');n.classList.toggle('dim',!s.includes(sc));n.classList.toggle('lit',s.includes(sc));});
  es.forEach(e=>{const s=(e.dataset.scenes||'').split(' ');if(s.includes(sc)){e.classList.remove('dim');e.classList.add('lit');e.style.stroke=col;}else{e.classList.remove('lit');e.classList.add('dim');e.style.stroke='';}});
  oM(sc);
}
function oM(sc){
  const d=D[sc];
  document.getElementById('mbar').style.background=d.c;
  document.getElementById('mt').textContent=d.t;
  const ol=document.getElementById('mb');ol.innerHTML='';
  d.s.forEach(([txt,bg,col,lbl])=>{
    const li=document.createElement('li');li.textContent=txt+' ';
    if(lbl){const sp=document.createElement('span');sp.className='tag';sp.style.background=bg;sp.style.color=col;sp.textContent=lbl;li.appendChild(sp);}
    ol.appendChild(li);
  });
  document.getElementById('mbd').classList.add('on');
}
function cM(e){if(!e||e.target===document.getElementById('mbd'))document.getElementById('mbd').classList.remove('on');}
</script>
